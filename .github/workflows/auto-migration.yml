name: Auto-generate migration on develop

# schema.prisma 가 develop 에 push 되면 자동으로:
#   1. 원격 dev Supabase project (develop dev DB) 에 현재 누적된 migration 모두 적용
#   2. schema.prisma 와 비교해 신규 migration 1 개 생성 + dev DB 에 적용
#   3. 새 migration 디렉토리를 develop 에 commit/push
# 그 commit 이 master 로 merge 되면 Vercel build 의 prisma migrate deploy 가 운영 적용.
#
# Required environment ("dev") secrets:
#   - DEV_DATABASE_URL      : 원격 dev Supabase Transaction pooler URL (?schema=claim)
#   - DEV_DIRECT_URL        : 원격 dev Supabase Session pooler URL    (?schema=claim)
#   - MIGRATIONS_PUSH_TOKEN : fine-grained PAT (Contents: Read and write, repo: claim-web).
#                             기본 GITHUB_TOKEN 으로도 push 자체는 되지만, 자동 commit 이
#                             다른 워크플로 트리거 가능해야 하거나 develop 에 branch protection
#                             "Restrict who can push" 가 걸리는 미래 대비 + 회전·폐기 용이.
# Settings → Environments → "dev" 생성 후 위 3개를 environment secret 으로 등록.
# Deployment branches 를 `develop` 로 제한해두면 다른 브랜치에서 접근 차단.

on:
  push:
    branches: [develop]
    paths:
      - 'prisma/schema.prisma'

concurrency:
  # 여러 develop push 가 거의 동시에 들어와도 직렬화 (race 방지)
  group: prisma-auto-migration
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    environment: dev          # GitHub environment — DEV_* secrets 격리
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MIGRATIONS_PUSH_TOKEN }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Detect drift / generate migration
        id: gen
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          DIRECT_URL:   ${{ secrets.DEV_DIRECT_URL }}
        run: |
          set -euo pipefail
          NAME="auto_$(date -u +%Y%m%d_%H%M%S)"
          MIG_DIR="prisma/migrations/${NAME}"

          # 1. 기존 migration 모두 적용 — dev DB 를 last-applied 상태로 정렬.
          #    (이미 따라가고 있으면 "No pending migrations to apply." no-op.)
          pnpm prisma migrate deploy

          # 2. live dev DB ↔ schema.prisma 의 diff 를 SQL 로 산출.
          #    `migrate dev` 는 shadow DB 를 요구 → managed Supabase 에서 CREATE DATABASE
          #    권한 없어 실패. `migrate diff --from-schema-datasource` 는 live DB 를
          #    introspect 해 비교하므로 shadow 불필요. 위 deploy 로 DB 가 마지막 migration
          #    상태와 동일하다고 보장되니, 결과 diff = 새 schema 변경분.
          DIFF_FILE=$(mktemp)
          pnpm prisma migrate diff \
            --from-schema-datasource prisma/schema.prisma \
            --to-schema-datamodel    prisma/schema.prisma \
            --script \
          > "$DIFF_FILE"

          # 3. 변경 없음 판정 — Prisma 는 빈 diff 일 때 "-- This is an empty migration." 한 줄만 출력.
          if [ ! -s "$DIFF_FILE" ] || grep -qE "^-- This is an empty migration\.?$" "$DIFF_FILE"; then
            echo "No schema changes detected — skipping migration."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Generated migration SQL:"
          echo "------------------------"
          cat "$DIFF_FILE"
          echo "------------------------"

          # 4. 새 migration 디렉토리 생성 + 적용 (deploy 가 _prisma_migrations 에 기록).
          mkdir -p "$MIG_DIR"
          mv "$DIFF_FILE" "$MIG_DIR/migration.sql"
          pnpm prisma migrate deploy

          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "name=$NAME"   >> "$GITHUB_OUTPUT"

      - name: Commit & push migration
        if: steps.gen.outputs.created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prisma/migrations
          if ! git diff --cached --quiet; then
            git commit -m "chore(db): auto migration ${{ steps.gen.outputs.name }} [skip ci]"
            git push origin develop
          else
            echo "No migration files to commit."
          fi
