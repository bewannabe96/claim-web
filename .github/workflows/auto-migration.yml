name: Auto-generate migration on develop

# schema.prisma 가 develop 에 push 되면 자동으로:
#   1. 원격 dev Supabase project (develop dev DB) 에 현재 누적된 migration 모두 적용
#   2. schema.prisma 와 비교해 신규 migration 1 개 생성 + dev DB 에 적용
#   3. 새 migration 디렉토리를 develop 에 commit/push
# 그 commit 이 master 로 merge 되면 Vercel build 의 prisma migrate deploy 가 운영 적용.
#
# Required secrets (Repository settings → Secrets and variables → Actions):
#   - DEV_DATABASE_URL  : 원격 dev Supabase Transaction pooler URL (?schema=claim)
#   - DEV_DIRECT_URL    : 원격 dev Supabase Session pooler URL    (?schema=claim)
#   - MIGRATIONS_PUSH_TOKEN : repo `contents:write` 권한 PAT (또는 fine-grained token).
#     `secrets.GITHUB_TOKEN` 으론 같은 workflow trigger 차단으로 자기 자신 트리거 안 되니 OK
#     이지만, branch protection 의 "Restrict who can push" 우회를 위해 PAT 권장.

on:
  push:
    branches: [develop]
    paths:
      - 'prisma/schema.prisma'

concurrency:
  # 여러 develop push 가 거의 동시에 들어와도 직렬화 (race 방지)
  group: prisma-auto-migration
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MIGRATIONS_PUSH_TOKEN }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Detect drift / generate migration
        id: gen
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          DIRECT_URL:   ${{ secrets.DEV_DIRECT_URL }}
        run: |
          set -euo pipefail
          NAME="auto_$(date -u +%Y%m%d_%H%M%S)"

          # 1. 기존 migration 모두 적용 (dev DB 가 이미 따라가고 있으면 no-op)
          pnpm prisma migrate deploy

          # 2. schema.prisma 와 diff → 새 migration 생성 + 적용
          #    --create-only 안 씀: 만들고 바로 적용하길 원함.
          #    schema 변경이 없으면 "no schema changes" 로 종료 (exit 0) — created=false 로 flag.
          OUT=$(pnpm prisma migrate dev --name "$NAME" --skip-seed 2>&1)
          echo "$OUT"
          if echo "$OUT" | grep -q "Already in sync"; then
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo "created=true"  >> "$GITHUB_OUTPUT"
            echo "name=$NAME"    >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push migration
        if: steps.gen.outputs.created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prisma/migrations
          if ! git diff --cached --quiet; then
            git commit -m "chore(db): auto migration ${{ steps.gen.outputs.name }} [skip ci]"
            git push origin develop
          else
            echo "No migration files to commit."
          fi
